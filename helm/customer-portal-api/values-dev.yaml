replicaCount: 2

image:
  repository: localhost:5100/000000000000/us-east-1/customer-portal-api
  tag: dev-2653055598-1c1a6c7b
  pullPolicy: IfNotPresent

app:
  version: dev-2653055598-1c1a6c7b
  environment: dev

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "80" 

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
