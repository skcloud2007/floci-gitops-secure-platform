stages:
  - validate
  - build
  - scan
  - publish
  - evidence
  - update_gitops

variables:
  AWS_ENDPOINT_URL: "http://localhost:4566"
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  IMAGE_NAME: "customer-portal-api"
  KUBECONFIG: "$HOME/.kube/config"

before_script:
  - export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
  - export KUBECONFIG="$HOME/.kube/config"
  - export IMAGE_TAG="dev-${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"
  - echo "IMAGE_TAG=${IMAGE_TAG}"
  - echo "Runner user=$(whoami)"
  - echo "Runner host=$(hostname)"
  - docker version
  - aws --version
  - kubectl version --client
  - helm version
  - trivy --version | head -5

validate:
  stage: validate
  script:
    - echo "Validating local FLoCI, Kubernetes, and Helm setup"
    - docker ps | grep -E 'floci|registry'
    - aws s3 ls --endpoint-url "$AWS_ENDPOINT_URL"
    - aws ecr describe-repositories --repository-names "$IMAGE_NAME" --endpoint-url "$AWS_ENDPOINT_URL"
    - kubectl get nodes
    - helm lint helm/customer-portal-api
    - mkdir -p reports
    - helm template customer-portal-api-dev helm/customer-portal-api -f helm/customer-portal-api/values-dev.yaml --namespace customer-dev > reports/render-check.yaml

build:
  stage: build
  script:
    - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} ./app
    - docker images | grep ${IMAGE_NAME}
    - echo "IMAGE_TAG=${IMAGE_TAG}" > build.env
  artifacts:
    reports:
      dotenv: build.env

scan:
  stage: scan
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p reports
    - trivy image --exit-code 0 --format json -o reports/trivy-image-${IMAGE_TAG}.json ${IMAGE_NAME}:${IMAGE_TAG}
    - trivy image --exit-code 0 --format table -o reports/trivy-image-${IMAGE_TAG}.txt ${IMAGE_NAME}:${IMAGE_TAG}
    - echo "Trivy image scan completed"
  artifacts:
    when: always
    paths:
      - reports/trivy-image-*.json
      - reports/trivy-image-*.txt

publish:
  stage: publish
  needs:
    - job: build
      artifacts: true
    - job: scan
      artifacts: true
  script:
    - aws ecr get-login-password --endpoint-url "$AWS_ENDPOINT_URL" | docker login --username AWS --password-stdin localhost:5100
    - export REPO_URI=$(aws ecr describe-repositories --repository-names "$IMAGE_NAME" --query 'repositories[0].repositoryUri' --output text --endpoint-url "$AWS_ENDPOINT_URL")
    - echo "REPO_URI=${REPO_URI}"
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${REPO_URI}:${IMAGE_TAG}
    - docker push ${REPO_URI}:${IMAGE_TAG}
    - echo "REPO_URI=${REPO_URI}" >> build.env
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
  artifacts:
    reports:
      dotenv: build.env

evidence:
  stage: evidence
  needs:
    - job: publish
      artifacts: true
    - job: scan
      artifacts: true
  script:
    - mkdir -p reports
    - aws s3 mb s3://floci-release-evidence --endpoint-url "$AWS_ENDPOINT_URL" || true
    - aws s3 mb s3://floci-security-reports --endpoint-url "$AWS_ENDPOINT_URL" || true
    - aws s3 mb s3://floci-helm-artifacts --endpoint-url "$AWS_ENDPOINT_URL" || true
    - |
      helm template customer-portal-api-dev helm/customer-portal-api \
        -f helm/customer-portal-api/values-dev.yaml \
        --set image.repository="${REPO_URI}" \
        --set image.tag="${IMAGE_TAG}" \
        --set app.version="${IMAGE_TAG}" \
        --namespace customer-dev \
        > reports/customer-portal-api-dev-rendered-${IMAGE_TAG}.yaml
    - aws s3 cp reports/trivy-image-${IMAGE_TAG}.json s3://floci-security-reports/customer-portal-api/dev/${IMAGE_TAG}/trivy-image.json --endpoint-url "$AWS_ENDPOINT_URL"
    - aws s3 cp reports/trivy-image-${IMAGE_TAG}.txt s3://floci-security-reports/customer-portal-api/dev/${IMAGE_TAG}/trivy-image.txt --endpoint-url "$AWS_ENDPOINT_URL"
    - aws s3 cp reports/customer-portal-api-dev-rendered-${IMAGE_TAG}.yaml s3://floci-helm-artifacts/customer-portal-api/dev/${IMAGE_TAG}/rendered.yaml --endpoint-url "$AWS_ENDPOINT_URL"
    - |
      aws dynamodb create-table \
        --table-name GitOpsReleaseLedger \
        --attribute-definitions AttributeName=release_id,AttributeType=S \
        --key-schema AttributeName=release_id,KeyType=HASH \
        --billing-mode PAY_PER_REQUEST \
        --endpoint-url "$AWS_ENDPOINT_URL" || true
    - |
      aws dynamodb put-item \
        --table-name GitOpsReleaseLedger \
        --item "{
          \"release_id\": {\"S\": \"${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}\"},
          \"service\": {\"S\": \"customer-portal-api\"},
          \"environment\": {\"S\": \"dev\"},
          \"image\": {\"S\": \"${REPO_URI}:${IMAGE_TAG}\"},
          \"image_tag\": {\"S\": \"${IMAGE_TAG}\"},
          \"commit\": {\"S\": \"${CI_COMMIT_SHA}\"},
          \"pipeline_id\": {\"S\": \"${CI_PIPELINE_ID}\"},
          \"status\": {\"S\": \"evidence_uploaded\"}
        }" \
        --endpoint-url "$AWS_ENDPOINT_URL"
    - |
      QUEUE_URL=$(aws sqs create-queue \
        --queue-name gitops-release-events \
        --query 'QueueUrl' \
        --output text \
        --endpoint-url "$AWS_ENDPOINT_URL")

      aws sqs send-message \
        --queue-url "$QUEUE_URL" \
        --message-body "{\"service\":\"customer-portal-api\",\"env\":\"dev\",\"image\":\"${REPO_URI}:${IMAGE_TAG}\",\"pipeline\":\"${CI_PIPELINE_ID}\"}" \
        --endpoint-url "$AWS_ENDPOINT_URL"
  artifacts:
    when: always
    paths:
      - reports/

update_gitops:
  stage: update_gitops
  needs:
    - job: publish
      artifacts: true
    - job: evidence
      artifacts: true
  script:
    - ./scripts/update-dev-values.sh
    - git config user.name "floci-gitops-bot"
    - git config user.email "floci-gitops-bot@example.com"
    - git status
    - |
      if git diff --quiet helm/customer-portal-api/values-dev.yaml; then
        echo "No GitOps values change detected"
        exit 0
      fi
    - git add helm/customer-portal-api/values-dev.yaml
    - git commit -m "Update dev image to ${IMAGE_TAG} [skip ci]"
    - git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/skcloud2007/floci-gitops-secure-platform.git"
    - git push origin HEAD:main
