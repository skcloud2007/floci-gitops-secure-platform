apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-security-policies
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://gitlab.com/skcloud2007/floci-gitops-secure-platform.git'
    targetRevision: main
    path: security/kyverno

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
