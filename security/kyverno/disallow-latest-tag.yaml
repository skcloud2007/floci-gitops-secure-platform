apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Images must use immutable tags. The 'latest' tag is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
    - name: require-image-tag-not-empty
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Image tag is required. Do not use implicit latest."
        pattern:
          spec:
            containers:
              - image: "*:*"
